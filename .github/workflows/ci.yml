name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck / Lint / Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  e2e:
    name: E2E + DB (Playwright + Supabase)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Local Supabase stack (well-known demo keys — local only, never production).
      SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Test secrets shared by the app + the E2E helpers (SMS_LIVE stays unset).
      CRON_SECRET: e2e-cron-secret
      TWILIO_AUTH_TOKEN: e2e-twilio-token
      TWILIO_INBOUND_URL: http://localhost:3000/api/sms/inbound

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase (local stack)
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start

      - name: Apply migrations + seed
        run: supabase db reset

      - name: DB integration tests (incl. SCH-22 atomic-claim concurrency)
        run: npm run test:db

      - name: Reset DB for a clean E2E slate
        run: supabase db reset

      - name: Build the app
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
